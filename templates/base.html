<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Shop | Аренда для активного отдыха{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'index' %}" class="logo">
            <i class="fa-solid fa-mountain-sun"></i>
            <span>Смарт-Прокат</span>
        </a>
        <div class="nav-links">
            <a href="{% url 'index' %}"><i class="fa-solid fa-house"></i> <span class="nav-text">Главная</span></a>
            <a href="{% url 'cart' %}" class="cart-btn"><i class="fa-solid fa-cart-shopping"></i> <span class="nav-text">Корзина</span></a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <span>&copy; 2026 Смарт-Прокат</span>
        <span class="footer-dot">·</span>
        <span>Аренда для активного отдыха</span>
    </footer>
    <div id="toast-container"></div>
    <script src="{% static 'app.js' %}"></script>
    <script src="{% static 'demo.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
